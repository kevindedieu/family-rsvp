<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Family RSVP</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #f5f0e8;
    --warm: #e8dfc8;
    --brown: #5c4a32;
    --amber: #c8873a;
    --amber-light: #e8a85a;
    --sage: #7a9e7e;
    --text: #2a1f14;
    --text-muted: #8a7560;
    --white: #fffef9;
    --shadow: 0 4px 24px rgba(92,74,50,0.10);
    --radius: 16px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--cream);
    color: var(--text);
    min-height: 100vh;
  }

  /* Background texture */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: radial-gradient(circle at 20% 20%, rgba(200,135,58,0.08) 0%, transparent 50%),
                      radial-gradient(circle at 80% 80%, rgba(122,158,126,0.08) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    max-width: 900px;
    margin: 0 auto;
    padding: 32px 20px;
    position: relative;
    z-index: 1;
  }

  /* Header */
  header {
    text-align: center;
    margin-bottom: 48px;
  }

  .family-icon {
    font-size: 2.5rem;
    margin-bottom: 12px;
  }

  header h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2rem, 5vw, 3rem);
    color: var(--brown);
    letter-spacing: -0.5px;
    margin-bottom: 8px;
  }

  header p {
    color: var(--text-muted);
    font-weight: 300;
    font-size: 1.05rem;
  }

  /* Tabs */
  .tabs {
    display: flex;
    gap: 8px;
    margin-bottom: 32px;
    background: var(--warm);
    padding: 6px;
    border-radius: 50px;
    width: fit-content;
    margin-left: auto;
    margin-right: auto;
  }

  .tab {
    padding: 10px 28px;
    border-radius: 50px;
    border: none;
    background: transparent;
    color: var(--text-muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.95rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s ease;
  }

  .tab.active {
    background: var(--white);
    color: var(--brown);
    box-shadow: 0 2px 8px rgba(92,74,50,0.12);
  }

  /* Cards */
  .card {
    background: var(--white);
    border-radius: var(--radius);
    padding: 36px;
    box-shadow: var(--shadow);
    margin-bottom: 24px;
  }

  /* Form */
  .form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
  }

  .form-group {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .form-group.full {
    grid-column: 1 / -1;
  }

  label {
    font-size: 0.85rem;
    font-weight: 500;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  input, select {
    padding: 12px 16px;
    border: 1.5px solid var(--warm);
    border-radius: 10px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.97rem;
    color: var(--text);
    background: var(--cream);
    transition: border-color 0.2s;
    outline: none;
    width: 100%;
  }

  input:focus, select:focus {
    border-color: var(--amber);
    background: var(--white);
  }

  .attendance-group {
    display: flex;
    gap: 12px;
    margin-top: 2px;
  }

  .attendance-btn {
    flex: 1;
    padding: 12px;
    border: 1.5px solid var(--warm);
    border-radius: 10px;
    background: var(--cream);
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.95rem;
    font-weight: 500;
    color: var(--text-muted);
    transition: all 0.2s;
    text-align: center;
  }

  .attendance-btn.yes.selected { border-color: var(--sage); background: #edf5ee; color: #3d6b42; }
  .attendance-btn.no.selected  { border-color: #c87a7a; background: #f5edec; color: #8b3a3a; }

  .submit-btn {
    width: 100%;
    padding: 16px;
    background: var(--amber);
    color: white;
    border: none;
    border-radius: 12px;
    font-family: 'Playfair Display', serif;
    font-size: 1.1rem;
    font-weight: 600;
    cursor: pointer;
    margin-top: 12px;
    transition: background 0.2s, transform 0.1s;
    letter-spacing: 0.3px;
  }

  .submit-btn:hover { background: var(--amber-light); transform: translateY(-1px); }
  .submit-btn:active { transform: translateY(0); }

  .success-msg {
    display: none;
    text-align: center;
    padding: 20px;
    background: #edf5ee;
    border-radius: 12px;
    color: #3d6b42;
    font-weight: 500;
    margin-top: 16px;
    font-size: 1rem;
  }

  /* Calendar view */
  .calendar-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 24px;
  }

  .calendar-header h2 {
    font-family: 'Playfair Display', serif;
    font-size: 1.4rem;
    color: var(--brown);
  }

  .nav-btn {
    background: var(--cream);
    border: 1.5px solid var(--warm);
    border-radius: 8px;
    padding: 8px 16px;
    cursor: pointer;
    font-size: 1rem;
    color: var(--brown);
    transition: all 0.2s;
  }

  .nav-btn:hover { background: var(--warm); }

  .calendar-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 4px;
  }

  .day-name {
    text-align: center;
    font-size: 0.75rem;
    font-weight: 500;
    color: var(--text-muted);
    padding: 8px 4px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .day-cell {
    aspect-ratio: 1;
    border-radius: 10px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.15s;
    position: relative;
    background: var(--cream);
    min-height: 48px;
  }

  .day-cell:hover { background: var(--warm); }
  .day-cell.empty { background: transparent; cursor: default; }
  .day-cell.today { background: var(--warm); font-weight: 600; }
  .day-cell.today .day-num { color: var(--amber); font-weight: 700; }

  .day-cell.has-guests {
    background: linear-gradient(135deg, #edf5ee, #e0f0e3);
    border: 1.5px solid #b8deba;
  }

  .day-num {
    font-size: 0.9rem;
    font-weight: 500;
    color: var(--text);
    line-height: 1;
  }

  .guest-dot {
    font-size: 0.6rem;
    color: var(--sage);
    font-weight: 600;
    margin-top: 2px;
  }

  /* Day detail panel */
  .day-detail {
    display: none;
    margin-top: 24px;
    padding: 24px;
    background: var(--cream);
    border-radius: 12px;
    border: 1.5px solid var(--warm);
  }

  .day-detail h3 {
    font-family: 'Playfair Display', serif;
    color: var(--brown);
    margin-bottom: 16px;
    font-size: 1.1rem;
  }

  .rsvp-entry {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 14px;
    background: var(--white);
    border-radius: 10px;
    margin-bottom: 8px;
  }

  .rsvp-avatar {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: var(--amber);
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-size: 0.85rem;
    flex-shrink: 0;
  }

  .rsvp-info { flex: 1; }
  .rsvp-name { font-weight: 500; font-size: 0.95rem; }
  .rsvp-sub { font-size: 0.8rem; color: var(--text-muted); }

  .rsvp-status {
    font-size: 0.8rem;
    padding: 4px 10px;
    border-radius: 20px;
    font-weight: 500;
  }

  .rsvp-status.yes { background: #edf5ee; color: #3d6b42; }
  .rsvp-status.no  { background: #f5edec; color: #8b3a3a; }

  .no-rsvp {
    text-align: center;
    color: var(--text-muted);
    font-size: 0.9rem;
    padding: 16px;
  }

  /* Summary stats */
  .stats-row {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
    margin-bottom: 28px;
  }

  .stat-card {
    background: var(--cream);
    border-radius: 12px;
    padding: 20px;
    text-align: center;
    border: 1.5px solid var(--warm);
  }

  .stat-num {
    font-family: 'Playfair Display', serif;
    font-size: 2rem;
    font-weight: 700;
    color: var(--amber);
    line-height: 1;
  }

  .stat-label {
    font-size: 0.8rem;
    color: var(--text-muted);
    margin-top: 4px;
    text-transform: uppercase;
    letter-spacing: 0.4px;
  }

  /* Responses list */
  .responses-section { margin-top: 32px; }
  .responses-section h3 {
    font-family: 'Playfair Display', serif;
    color: var(--brown);
    margin-bottom: 16px;
    font-size: 1.2rem;
  }

  .delete-btn {
    background: none;
    border: none;
    color: #ccc;
    cursor: pointer;
    font-size: 1rem;
    padding: 4px;
    transition: color 0.2s;
  }
  .delete-btn:hover { color: #c87a7a; }

  .empty-state {
    text-align: center;
    color: var(--text-muted);
    padding: 40px 20px;
    font-size: 0.95rem;
  }

  .empty-state .big-emoji { font-size: 2.5rem; margin-bottom: 12px; }

  @media (max-width: 600px) {
    .form-grid { grid-template-columns: 1fr; }
    .stats-row { grid-template-columns: 1fr 1fr; }
    .card { padding: 24px 20px; }
    .day-cell { min-height: 38px; }
    .day-num { font-size: 0.78rem; }
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="family-icon">🏡</div>
    <h1>Family Gathering</h1>
    <p>Let us know when you're coming!</p>
  </header>

  <div class="tabs">
    <button class="tab active" onclick="showTab('form')">✏️ Register</button>
    <button class="tab" onclick="showTab('calendar')">📅 Calendar</button>
    <button class="tab" onclick="showTab('list')">📋 All RSVPs</button>
  </div>

  <!-- FORM TAB -->
  <div id="tab-form">
    <div class="card">
      <div class="form-grid">
        <div class="form-group">
          <label>Your Name</label>
          <input type="text" id="f-name" placeholder="Marie Dupont">
        </div>
        <div class="form-group">
          <label>Family Unit</label>
          <input type="text" id="f-family" placeholder="The Duponts">
        </div>
        <div class="form-group">
          <label>Arrival Date</label>
          <input type="date" id="f-arrival">
        </div>
        <div class="form-group">
          <label>Departure Date</label>
          <input type="date" id="f-departure">
        </div>
        <div class="form-group">
          <label>Number of Guests</label>
          <input type="number" id="f-guests" min="1" max="20" placeholder="2">
        </div>
        <div class="form-group">
          <label>Attendance</label>
          <div class="attendance-group">
            <button class="attendance-btn yes" onclick="selectAttendance('yes')">✅ Coming</button>
            <button class="attendance-btn no" onclick="selectAttendance('no')">❌ Can't make it</button>
          </div>
        </div>
      </div>
      <button class="submit-btn" onclick="submitRSVP()">Save my RSVP →</button>
      <div class="success-msg" id="success-msg">🎉 Thanks! Your RSVP has been saved.</div>
    </div>
  </div>

  <!-- CALENDAR TAB -->
  <div id="tab-calendar" style="display:none;">
    <div class="card">
      <div class="calendar-header">
        <button class="nav-btn" onclick="changeMonth(-1)">← Prev</button>
        <h2 id="calendar-title"></h2>
        <button class="nav-btn" onclick="changeMonth(1)">Next →</button>
      </div>
      <div class="calendar-grid" id="calendar-grid"></div>
      <div class="day-detail" id="day-detail">
        <h3 id="detail-title"></h3>
        <div id="detail-entries"></div>
      </div>
    </div>
  </div>

  <!-- LIST TAB -->
  <div id="tab-list" style="display:none;">
    <div class="card">
      <div class="stats-row" id="stats-row"></div>
      <div class="responses-section">
        <h3>All Registrations</h3>
        <div id="all-rsvps"></div>
      </div>
    </div>
  </div>
</div>

<script>
  // ── State ──────────────────────────────────────────────────────────────────
  let rsvps = JSON.parse(localStorage.getItem('family_rsvps') || '[]');
  let attendance = null;
  let currentYear, currentMonth;

  const today = new Date();
  currentYear  = today.getFullYear();
  currentMonth = today.getMonth();

  // ── Helpers ────────────────────────────────────────────────────────────────
  function save() {
    localStorage.setItem('family_rsvps', JSON.stringify(rsvps));
  }

  function formatDate(d) {
    const [y,m,day] = d.split('-');
    return new Date(y,m-1,day).toLocaleDateString('en-GB', {day:'numeric',month:'short',year:'numeric'});
  }

  function initials(name) {
    return name.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
  }

  function avatarColor(name) {
    const colors = ['#c8873a','#7a9e7e','#9b7ec8','#c87a7a','#6b9bc8','#c8b47a'];
    let h = 0; for (const c of name) h = (h*31 + c.charCodeAt(0)) % colors.length;
    return colors[h];
  }

  // ── Tabs ───────────────────────────────────────────────────────────────────
  function showTab(t) {
    ['form','calendar','list'].forEach(id => {
      document.getElementById('tab-'+id).style.display = id===t ? '' : 'none';
    });
    document.querySelectorAll('.tab').forEach((btn,i) => {
      btn.classList.toggle('active', ['form','calendar','list'][i]===t);
    });
    if (t==='calendar') renderCalendar();
    if (t==='list')     renderList();
  }

  // ── Form ───────────────────────────────────────────────────────────────────
  function selectAttendance(v) {
    attendance = v;
    document.querySelectorAll('.attendance-btn').forEach(b => b.classList.remove('selected'));
    document.querySelector('.attendance-btn.'+v).classList.add('selected');
  }

  function submitRSVP() {
    const name     = document.getElementById('f-name').value.trim();
    const family   = document.getElementById('f-family').value.trim();
    const arrival  = document.getElementById('f-arrival').value;
    const departure= document.getElementById('f-departure').value;
    const guests   = parseInt(document.getElementById('f-guests').value) || 1;

    if (!name || !arrival || !departure || !attendance) {
      alert('Please fill in your name, dates, and attendance status.');
      return;
    }
    if (departure < arrival) { alert('Departure must be after arrival.'); return; }

    rsvps.push({ id: Date.now(), name, family, arrival, departure, guests, attendance });
    save();

    // Reset
    document.getElementById('f-name').value = '';
    document.getElementById('f-family').value = '';
    document.getElementById('f-arrival').value = '';
    document.getElementById('f-departure').value = '';
    document.getElementById('f-guests').value = '';
    document.querySelectorAll('.attendance-btn').forEach(b=>b.classList.remove('selected'));
    attendance = null;

    const msg = document.getElementById('success-msg');
    msg.style.display = 'block';
    setTimeout(()=>msg.style.display='none', 3000);
  }

  // ── Calendar ───────────────────────────────────────────────────────────────
  function changeMonth(d) { currentMonth+=d; if(currentMonth>11){currentMonth=0;currentYear++;} if(currentMonth<0){currentMonth=11;currentYear--;} renderCalendar(); }

  function dateInRange(dateStr, arrival, departure) {
    return dateStr >= arrival && dateStr <= departure;
  }

  function renderCalendar() {
    const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
    document.getElementById('calendar-title').textContent = months[currentMonth]+' '+currentYear;

    const grid = document.getElementById('calendar-grid');
    grid.innerHTML = '';
    ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'].forEach(d=>{
      const el = document.createElement('div');
      el.className = 'day-name'; el.textContent = d; grid.appendChild(el);
    });

    const firstDay = new Date(currentYear, currentMonth, 1).getDay();
    const offset = (firstDay+6)%7; // Mon=0
    const daysInMonth = new Date(currentYear, currentMonth+1, 0).getDate();

    for (let i=0;i<offset;i++) { const el=document.createElement('div'); el.className='day-cell empty'; grid.appendChild(el); }

    for (let d=1;d<=daysInMonth;d++) {
      const dateStr = `${currentYear}-${String(currentMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const dayRsvps = rsvps.filter(r=>r.attendance==='yes' && dateInRange(dateStr, r.arrival, r.departure));
      const isToday  = dateStr === today.toISOString().slice(0,10);

      const el = document.createElement('div');
      el.className = 'day-cell' + (isToday?' today':'') + (dayRsvps.length?' has-guests':'');
      el.innerHTML = `<span class="day-num">${d}</span>${dayRsvps.length?`<span class="guest-dot">👥${dayRsvps.reduce((s,r)=>s+r.guests,0)}</span>`:''}`;
      el.onclick = () => showDayDetail(dateStr, dayRsvps);
      grid.appendChild(el);
    }

    document.getElementById('day-detail').style.display='none';
  }

  function showDayDetail(dateStr, dayRsvps) {
    const panel = document.getElementById('day-detail');
    document.getElementById('detail-title').textContent = '📅 ' + formatDate(dateStr);
    const entries = document.getElementById('detail-entries');
    if (!dayRsvps.length) {
      entries.innerHTML = '<div class="no-rsvp">No one is coming this day.</div>';
    } else {
      entries.innerHTML = dayRsvps.map(r=>`
        <div class="rsvp-entry">
          <div class="rsvp-avatar" style="background:${avatarColor(r.name)}">${initials(r.name)}</div>
          <div class="rsvp-info">
            <div class="rsvp-name">${r.name}</div>
            <div class="rsvp-sub">${r.family ? r.family+' · ':''} ${r.guests} guest${r.guests>1?'s':''} · until ${formatDate(r.departure)}</div>
          </div>
          <span class="rsvp-status yes">Coming</span>
        </div>`).join('');
    }
    panel.style.display='block';
  }

  // ── List ───────────────────────────────────────────────────────────────────
  function renderList() {
    const coming  = rsvps.filter(r=>r.attendance==='yes');
    const notComing = rsvps.filter(r=>r.attendance==='no');
    const totalGuests = coming.reduce((s,r)=>s+r.guests,0);

    document.getElementById('stats-row').innerHTML = `
      <div class="stat-card"><div class="stat-num">${coming.length}</div><div class="stat-label">Families coming</div></div>
      <div class="stat-card"><div class="stat-num">${totalGuests}</div><div class="stat-label">Total guests</div></div>
      <div class="stat-card"><div class="stat-num">${notComing.length}</div><div class="stat-label">Can't make it</div></div>`;

    const container = document.getElementById('all-rsvps');
    if (!rsvps.length) {
      container.innerHTML = '<div class="empty-state"><div class="big-emoji">📭</div>No RSVPs yet. Be the first!</div>';
      return;
    }

    const sorted = [...rsvps].sort((a,b)=>a.arrival.localeCompare(b.arrival));
    container.innerHTML = sorted.map(r=>`
      <div class="rsvp-entry">
        <div class="rsvp-avatar" style="background:${avatarColor(r.name)}">${initials(r.name)}</div>
        <div class="rsvp-info">
          <div class="rsvp-name">${r.name}${r.family?' ('+r.family+')':''}</div>
          <div class="rsvp-sub">${formatDate(r.arrival)} → ${formatDate(r.departure)} · ${r.guests} guest${r.guests>1?'s':''}</div>
        </div>
        <span class="rsvp-status ${r.attendance}">${r.attendance==='yes'?'Coming':'Can\'t make it'}</span>
        <button class="delete-btn" onclick="deleteRSVP(${r.id})" title="Delete">✕</button>
      </div>`).join('');
  }

  function deleteRSVP(id) {
    if (!confirm('Remove this RSVP?')) return;
    rsvps = rsvps.filter(r=>r.id!==id);
    save();
    renderList();
  }

  // ── Init ───────────────────────────────────────────────────────────────────
  // Set default dates to today
  const todayStr = today.toISOString().slice(0,10);
  document.getElementById('f-arrival').value = todayStr;
  document.getElementById('f-departure').value = todayStr;
</script>
</body>
</html>
